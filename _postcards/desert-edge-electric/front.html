<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    @page { size: 6.25in 4.25in; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        width: 6.25in;
        height: 4.25in;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        overflow: hidden;
        background: linear-gradient(135deg, #78350f 0%, #b45309 50%, #f59e0b 100%);
        color: white;
        position: relative;
    }

    .safe-zone {
        position: absolute;
        top: 0.125in;
        left: 0.125in;
        right: 0.125in;
        bottom: 0.125in;
        display: flex;
        flex-direction: row;
        align-items: stretch;
    }

    /* Left: screenshot preview */
    .preview-area {
        width: 3.1in;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.2in 0.1in 0.2in 0.1in;
    }

    .preview-frame {
        background: white;
        border-radius: 8px;
        overflow: hidden;
        width: 100%;
        box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }
    .preview-frame .browser-bar {
        background: #f1f3f4;
        height: 16px;
        display: flex;
        align-items: center;
        padding: 0 8px;
        gap: 4px;
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28ca41; }
    .preview-frame img {
        width: 100%;
        display: block;
    }

    /* Right: message + QR */
    .content {
        flex: 1;
        padding: 0.2in 0.1in 0.2in 0.2in;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .biz-name {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        opacity: 0.8;
        margin-bottom: 8px;
    }

    h1 {
        font-size: 26px;
        font-weight: 800;
        line-height: 1.12;
        margin-bottom: 10px;
        letter-spacing: -0.02em;
    }

    .value-prop {
        font-size: 12px;
        line-height: 1.5;
        opacity: 0.85;
        margin-bottom: 18px;
    }

    .qr-section {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .qr-box {
        background: white;
        border-radius: 8px;
        padding: 6px;
        flex-shrink: 0;
        box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .qr-box img {
        width: 0.9in;
        height: 0.9in;
        display: block;
    }
    .qr-label {
        font-size: 13px;
        font-weight: 700;
        line-height: 1.35;
    }
    .qr-sublabel {
        font-size: 10px;
        opacity: 0.6;
        margin-top: 4px;
    }

    .brand-mark {
        position: absolute;
        bottom: 0.15in;
        right: 0.2in;
        font-size: 7px;
        opacity: 0.4;
        letter-spacing: 0.5px;
    }
</style>
</head>
<body>
    <div class="safe-zone">
        <div class="preview-area">
            <div class="preview-frame">
                <div class="browser-bar">
                    <div class="dot dot-r"></div>
                    <div class="dot dot-y"></div>
                    <div class="dot dot-g"></div>
                </div>
                <img src="https://waylanabbott.github.io/postcard-sites/_postcards/desert-edge-electric/screenshot.png" alt="Your website preview">
            </div>
        </div>
        <div class="content">
            <div class="biz-name">Desert Edge Electric</div>
            <h1>We Built You<br>a Free Website</h1>
            <p class="value-prop">Your business info, reviews, and a click-to-call button. All live and ready to go.</p>
            <div class="qr-section">
                <div class="qr-box">
                    <img src="https://waylanabbott.github.io/postcard-sites/_postcards/desert-edge-electric/qr.png" alt="QR Code">
                </div>
                <div>
                    <div class="qr-label">Scan to see<br>your new site</div>
                    <div class="qr-sublabel">It's already live</div>
                </div>
            </div>
        </div>
    </div>
    <div class="brand-mark">David AI — getdavid.ai</div>
</body>
</html>
